<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="shine" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#fff" stop-opacity="0.15"/>
      <stop offset="50%" stop-color="#fff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="node" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#c4b5fd"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>
  <rect width="512" height="512" rx="108" fill="url(#shine)"/>

  <!-- Left bracket { -->
  <path d="M152 148 C152 148, 122 148, 122 178 L122 232 C122 232, 122 256, 98 256 C122 256, 122 280, 122 280 L122 334 C122 364, 152 364, 152 364"
    stroke="#fff" stroke-width="28" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- Right bracket } -->
  <path d="M360 148 C360 148, 390 148, 390 178 L390 232 C390 232, 390 256, 414 256 C390 256, 390 280, 390 280 L390 334 C390 364, 360 364, 360 364"
    stroke="#fff" stroke-width="28" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- AI circuit nodes inside brackets -->
  <!-- Central node -->
  <circle cx="256" cy="256" r="18" fill="#fff"/>
  <!-- Top node -->
  <circle cx="256" cy="186" r="10" fill="url(#node)"/>
  <!-- Bottom node -->
  <circle cx="256" cy="326" r="10" fill="url(#node)"/>
  <!-- Left node -->
  <circle cx="200" cy="224" r="10" fill="url(#node)"/>
  <!-- Right node -->
  <circle cx="312" cy="224" r="10" fill="url(#node)"/>
  <!-- Bottom-left node -->
  <circle cx="200" cy="288" r="10" fill="url(#node)"/>
  <!-- Bottom-right node -->
  <circle cx="312" cy="288" r="10" fill="url(#node)"/>

  <!-- Connection lines from center to outer nodes -->
  <line x1="256" y1="238" x2="256" y2="196" stroke="#c4b5fd" stroke-width="3" stroke-linecap="round"/>
  <line x1="256" y1="274" x2="256" y2="316" stroke="#c4b5fd" stroke-width="3" stroke-linecap="round"/>
  <line x1="240" y1="246" x2="210" y2="228" stroke="#c4b5fd" stroke-width="3" stroke-linecap="round"/>
  <line x1="272" y1="246" x2="302" y2="228" stroke="#c4b5fd" stroke-width="3" stroke-linecap="round"/>
  <line x1="240" y1="266" x2="210" y2="284" stroke="#c4b5fd" stroke-width="3" stroke-linecap="round"/>
  <line x1="272" y1="266" x2="302" y2="284" stroke="#c4b5fd" stroke-width="3" stroke-linecap="round"/>

  <!-- Spark/pulse accent marks -->
  <circle cx="256" cy="256" r="28" stroke="#fff" stroke-width="2" fill="none" opacity="0.3"/>
</svg>
